<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DD.MM.YYYY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    min-height: 100dvh;
    background: #fff;
    color: #000;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 595px;
    margin: 0 auto;
    padding: 2rem 1.25rem;
  }

  /* ── Форма входа ── */

  #login {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .label {
    font-size: 14px;
    letter-spacing: 0.02em;
    margin-bottom: 1.5rem;
  }

  input[type="password"] {
    width: 100%;
    padding: 12px 0;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    border: none;
    border-bottom: 1px solid #000;
    background: transparent;
    color: #000;
    outline: none;
  }

  input[type="password"]::placeholder {
    color: #999;
  }

  #error {
    font-size: 12px;
    margin-top: 8px;
    min-height: 1.2em;
    color: #000;
  }

  button {
    margin-top: 1.5rem;
    width: 100%;
    padding: 12px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0.04em;
    background: #000;
    color: #fff;
    border: 1px solid #000;
    cursor: pointer;
  }

  button:hover {
    background: #fff;
    color: #000;
  }

  .login-photo {
    margin-top: auto;
    padding-top: 3rem;
    width: 35%;
    max-width: 160px;
    align-self: center;
    display: block;
    height: auto;
  }

  .login-photo.hidden {
    display: none;
  }

  /* ── Контент после входа ── */

  #content {
    display: none;
    flex: 1;
    flex-direction: column;
  }

  #content.visible {
    display: flex;
  }

  .a4-frame {
    width: 100%;
    aspect-ratio: 210 / 297;
    border: 1px solid #000;
    background: #fff;
    position: relative;
  }

  .a4-frame img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }

  .a4-frame img.hidden {
    display: none;
  }

  .a4-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #999;
    letter-spacing: 0.04em;
  }

  .a4-frame.has-image .a4-placeholder {
    display: none;
  }
  </style>
</head>
<body>

  <main class="page">

    <!-- Форма входа -->
    <div id="login">
      <p class="label">DD.MM.YYYY</p>
      <input type="password" id="pwd" placeholder="" autocomplete="off" />
      <div id="error"></div>
      <button onclick="checkPassword()">Confirm</button>

      <!-- Фото внизу: положи файл images/login.jpg -->
      <img
        class="login-photo"
        src="images/login.jpg"
        alt=""
        onerror="this.classList.add('hidden')"
      />
    </div>

    <!-- Поздравление (видно только после пароля) -->
    <div id="content">
      <!-- Картинка A4: положи файл images/letter.jpg -->
      <div class="a4-frame" id="a4-frame">
        <img
          id="letter-img"
          src="images/letter.jpg"
          alt=""
          onerror="this.classList.add('hidden')"
          onload="document.getElementById('a4-frame').classList.add('has-image')"
        />
        <span class="a4-placeholder">A4</span>
      </div>
    </div>

  </main>

  <script>
    const PASSWORDS = [
      '12072023',
      '12.07.2023',
      '07.12.2023',
      '12 07 2023',
    ];

    const pwdInput = document.getElementById('pwd');
    const errorEl  = document.getElementById('error');

    pwdInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
      if (PASSWORDS.includes(pwdInput.value.trim())) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('content').classList.add('visible');
      } else {
        errorEl.textContent = 'Incorrect';
        pwdInput.value = '';
        pwdInput.focus();
      }
    }
  </script>
</body>
</html>
